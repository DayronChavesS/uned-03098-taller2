    <script src="/assets/scripts/main.js"></script>
    <script src="/assets/scripts/header-footer.js"></script>
    <script src="/assets/scripts/payment.js"></script>

<body>

    <main>
        <section class="form-info">
            <h2>Procesar Pago</h2>
            <p>Ingrese los datos que se le solicitan para realizar el pago.</p>
        </section>
    </main>

    <section>
        <form method="GET" id="formulario-pago">
            <fieldset>
                <legend>Tarjeta Debito / Credito</legend>
                <label for="card">No. Tarjeta:</label> <a>(ex. 4012888888881881)</a>
                <input type="text" id="card" name="card" title="Solo numeros, sin espacios ni guiones." required
                    pattern="(?:4[0-9]{12}(?:[0-9]{3})?|[25][1-7][0-9]{14}|6(?:011|5[0-9][0-9])[0-9]{12}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|(?:2131|1800|35\d{3})\d{11})">

                <label for="expiration">Expiración:</label>
                <input type="month" id="expiration" name="expiration" required value="2024-04" min="2024-04"
                    max="2029-12">

                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" name="cvv" title="Tres numeros." required pattern="\d{3}">

                <section class="card-logos">
                    <svg preserveAspectRatio="xMidYMid meet" viewBox="0 0 300 100">
                        <image href="/assets/svg/visa.svg" />
                    </svg>
                    <svg preserveAspectRatio="xMidYMid meet" viewBox="0 0 1000 618">
                        <image href="/assets/svg/mastercard.svg" />
                    </svg>
                    <svg preserveAspectRatio="xMidYMid meet" viewBox="0 0 1000 997">
                        <image href="/assets/svg/americanexpress.svg" />
                    </svg>
                </section>

            </fieldset>
            <input id="pago" type="submit" value="Realizar Pago">
        </form>
    </section>

    <dialog id="dialog">
        <h6>¡Gracias por comprar en PetPretty!</h6>
        <div class="svg-container">
            <svg preserveAspectRatio="xMidYMid meet" viewBox="0 0 20 20">
                <image href="/assets/svg/email-send.svg" />
            </svg>
        </div>
        <p>Su compra se ha realizado satisfactoriamente. <br /> Se ha enviado un mensaje a su correo electronico con
            todos los detalles de la compra.</p>
        <form method="GET" method="dialog">
            <button id="cerrar-dialogo" autofocus>OK</button>
        </form>
    </dialog>

</body>

</html>
