<body>

    <main>
        <section class="form-info">
            <h2>Contáctanos</h2>
            <p>
                ¿Necesita conversar con nosotros? Llene el siguiente formulario y responderemos
                tan pronto como sea posible. La respuesta puede tardar algunos días en llegar.
            </p>
        </section>

        <section>
            <form method="GET" >
                <label for="fname">Nombre:</label>
                <input type="text" id="fname" name="name" required>
                <label for="lname">Correo:</label>
                <input type="email" id="lname" name="correo" required">
                
                <textarea id="message" name="message" rows="4" cols="50">Su mensaje aqui.</textarea>
                
                <input type="submit" value="Enviar">
            </form>
            
        </section>

        <section>
            <p>
                O comuniquese con nosotros por:
            <ul>
                <li>
                    Telefono: <a href="tel:+50688888888">(+506)8888-8888</a>
                </li>
                <li>
                    Correo Electronico: <a href="mailto:email@petpretty.co.cr">email@petpretty.co.cr</a>
                </li>
            </ul>
            </p>
        </section>
