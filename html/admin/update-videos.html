    <section>
        <form method="GET" >
            <label for="video">Seleccione el video objetivo:</label>

                <option value="video2">video2.mp4</option>
                <option value="video3">video3.mp4</option>
            </select>

            <label for="images" class="drop-container" id="dropcontainer">
                <span class="drop-title">Arrastre el video aqui</span>
                o
                <input type="file" id="new-video" name="new-video" required accept="video/*">
            </label>
