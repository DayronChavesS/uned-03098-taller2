<body>

    <main>
        <section class="form-info">
            <h2>Actualizar Catalogo</h2>
            <p>
                En esta pagina puede actualizar el catalogo de productos de PetPretty.
            </p>
        </section>
    </main>


    <section>
        <h4>Productos en Catalogo</h4>
        <table class="styled-table">
            <thead>
                <tr>
                    <th>No. Item</th>
                    <th>Nombre</th>
                    <th>Descripcion</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        Informacion
                    </td>
                    <td>
                        Informacion
                    </td>
                    <td>
                        Informacion
                    </td>
                </tr>
            </tbody>
        </table>
        <input type="button" value="Eliminar">
        <input type="button" value="Actualizar">

    </section>


    <section>
        <form method="GET" >
            <fieldset>
                <legend>Actualizar Producto Existente:</legend>

                <label for="title">Titulo:</label>
                <input type="text" id="title" name="title" required pattern="[a-zA-Z0-9 ]+"
                    title="Solo letras y numeros.">

                <label for="images" class="drop-container" id="dropcontainer">
                    <span class="drop-title">Arrastre la imagen aqui</span>
                    o
                    <input type="file" id="images" accept="image/*" required>
                </label>

                <label for="description">Descripcion del producto:</label>
                <textarea id="description" name="description" rows="4" cols="50" required></textarea>

            </fieldset>

            <input type="submit" value="Aplicar Cambios">
        </form>

    </section>

    <section>
        <form method="GET" >
            <fieldset>
                <legend>Agregar Producto Nuevo:</legend>

                <label for="title">Titulo:</label>
                <input type="text" id="title" name="title" required pattern="[a-zA-Z0-9 ]+"
                    title="Solo letras y numeros.">

                <label for="images" class="drop-container" id="dropcontainer">
                    <span class="drop-title">Arrastre la imagen aqui</span>
                    o
                    <input type="file" id="images" accept="image/*" required>
                </label>
                <label for="description">Descripcion del producto:</label>
                <textarea id="description" name="description" rows="4" cols="50" required></textarea>

            </fieldset>

            <input type="submit" value="Crear Producto">
        </form>
    </section>

</body>
