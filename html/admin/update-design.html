<body>

    <main>
        <section>
            <h2>Actualizador de Diseños</h2>
            <p>
                En esta pagina puede actualizar los diseños de otros diseñadores de PetPretty.
            </p>
        </section>
    </main>

    <section>
        <form method="GET" >
            <label for="design">Seleccione el diseño objetivo:</label>
            <select name="design" id="design">
                <optgroup label="Diseñador1">
                    <option value="design1">Diseño1</option>
                    <option value="design2">Diseño2</option>
                    <option value="design3">Diseño3</option>
                </optgroup>
                <optgroup label="Diseñador2">
                    <option value="design4">Diseño1</option>
                    <option value="design5">Diseño2</option>
                    <option value="design6">Diseño3</option>
                </optgroup>
                <optgroup label="Diseñador3">
                    <option value="design7">Diseño1</option>
                    <option value="design8">Diseño2</option>
                    <option value="design9">Diseño3</option>
                </optgroup>
            </select>

            <label for="color">Color:</label>
            <input type="color" id="color" name="color">

            <label for="estilo">Estilo:</label>
            <select name="estilo" id="estilo">
                <optgroup label="Estilo">
                    <option value="collar">Collares</option>
                    <option value="camisa">Camisas</option>
                    <option value="gorro">Gorros</option>
                    <option value="pijama">Pijamas</option>
                    <option value="zapato">Zapatos</option>
                    <option value="disfraz">Disfraces</option>
                    <option value="vestido">Vestidos</option>
                    <option value="exterior">Exteriores</option>
                    <option value="abrigo">Abrigos</option>
                    <option value="accesorio">Accesorios</option>
                </optgroup>
            </select>

            <label for="talla">Talla:</label>
            <select name="talla" id="talla">
                <optgroup label="Talla">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </optgroup>
            </select>

            <label for="images" class="drop-container" id="dropcontainer">
                <span class="drop-title">Arrastre la imagen aqui</span>
                o
                <input type="file" id="images" accept="image/*" required>
            </label>

            <label for="description">Descripción:</label>
            <textarea id="description" name="description" rows="4" cols="50" required></textarea>

            <div>
                <input type="checkbox" id="promocion" name="promocion" value="promotion">
                <label for="promocion">Esta en promoción.</label>
            </div>

            <input type="submit" value="Aplicar Cambios">
        </form>
    </section>

</body>
