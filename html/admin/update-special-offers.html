<body>

    <main>
        <section class="form-info">
            <h2>Actualizar Promociones</h2>
            <p>
                En esta pagina puede actualizar las promociones de PetPretty.
            </p>
        </section>
    </main>


    <section>
        <h4>Promociones Actuales</h4>
        <table class="styled-table">
            <thead>
                <tr>
                    <th>No. Item</th>
                    <th>Descripcion</th>
                    <th>Reglas</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        Informacion
                    </td>
                    <td>
                        Informacion
                    </td>
                    <td>
                        Informacion
                    </td>
                </tr>
            </tbody>
        </table>
        <input type="button" value="Eliminar">
    </section>

    <section>
        <form method="GET" >
            <fieldset>
                <legend>Crear Nueva Promocion</legend>

                <label for="product">Seleccione el producto:</label>
                <select name="product" id="product">
                    <option value="product1">product1</option>
                    <option value="product2">product2</option>
                    <option value="product3">product3</option>
                </select>

                <div>
                    <label for="quantity">Lleve:</label>
                    <input type="number" id="quantity" name="quantity" required value="1" min="1" max="99"
                        pattern="\d+">
                </div>

                <div>
                    <label for="quantity2">Por el precio de:</label>
                    <input type="number" id="quantity2" name="quantity2" required value="1" min="1" max="99"
                        pattern="\d+">
                </div>
            </fieldset>

            <input type="submit" value="Agregar">
        </form>
    </section>
