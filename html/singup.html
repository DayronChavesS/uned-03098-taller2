<body>

    <main>
        <section class="form-info">
            <h2>Crear una Cuenta de PetPretty</h2>
            <p>
                Ingrese los siguientes datos para continuar:
            </p>
        </section>
    </main>

    <section>
        <form method="GET" id="form-singup" >
            <fieldset>
                <legend>Datos Personales</legend>
                <label for="name">Nombre Completo:</label>
                <input type="text" id="name" name="name" required pattern="[a-zA-Z ]+" title="Solo letras.">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="phone">Numero de Telefono:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{4}-[0-9]{4}" title="Formato: 8888-8888" required>

                <label for="home">Dirección de Domicilio:</label>
                <textarea id="home" name="home" rows="4" cols="50" required></textarea>
            </fieldset>

            

            <fieldset>
                <legend>Cuenta PetPretty</legend>
                <label for="user">Usuario:</label>
                <input type="text" id="user" name="user" required title="Solo letras y numeros." pattern="[a-zA-Z[0-9] ]+">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required minlength="8" maxlength="36">
                <label for="password-validate">Validar contraseña:</label>
                <input type="password" id="password-validate" name="password-validate" required minlength="8" maxlength="36">
            </fieldset>

            
            <input type="submit" value="CREAR CUENTA">
        </form>
    </section>

</body>
