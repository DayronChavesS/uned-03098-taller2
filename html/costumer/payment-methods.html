    <section>
        <form method="GET" >

                    <option value="id3">American Express</option>

                <optgroup label="Deposito">
                    <option value="id1">Banco Nacional</option>
                    <option value="id2">BAC Credomatic</option>
                    <option value="id3">Sinpe Movil</option>
                </optgroup>
                <optgroup label="Otros">
                    <option value="id1">Pago en Tienda</option>
                </optgroup>

        </form>
